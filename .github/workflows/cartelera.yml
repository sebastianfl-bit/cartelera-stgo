name: Actualizar cartelera

on:
  schedule:
    # 07:00 y 12:00 hora de Chile (UTC-4). Temprano a propósito: Cinemark va borrando
    # las funciones ya pasadas, así que un scrape nocturno deja el día casi vacío.
    - cron: "0 11,16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      # Cinépolis necesita un Chrome REAL en modo headed (Cloudflare detecta headless).
      # Xvfb (--with-deps lo instala) da una pantalla virtual para correr headed sin
      # monitor. Si aun así Cloudflare bloquea (por la IP de datacenter), el adaptador
      # devuelve [] y el resto de la cartelera se publica igual.
      - name: Instalar Chromium + Xvfb
        run: npx playwright install --with-deps chromium
        continue-on-error: true

      # xvfb-run envuelve el scraper en una pantalla virtual → Playwright corre headed.
      - name: Construir cartelera
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" node scripts/scrape.mjs
        env:
          HEADFUL: "1"          # fuerza headless:false; Xvfb le da la pantalla
          DEBUG_CINEPOLIS: "1"  # deja rastro en el log para diagnosticar

      - name: Publicar si cambió
        run: |
          if git diff --quiet data/cartelera.json; then
            echo "Sin cambios."
            exit 0
          fi
          git config user.name  "cartelera-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/cartelera.json
          git commit -m "cartelera $(date -u +%F' '%H:%M) UTC"
          git push
