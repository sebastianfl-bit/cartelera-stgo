<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cartelera Santiago</title>
<meta name="description" content="Toda la cartelera de cine de Santiago sobre un mismo eje horario.">
<meta name="theme-color" content="#16183A">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --tinta:#16183A;
    --tinta-2:#1E2151;
    --tinta-3:#2A2E66;
    --hueso:#F2ECE0;
    --hueso-60:rgba(242,236,224,.60);
    --hueso-35:rgba(242,236,224,.35);
    --hueso-14:rgba(242,236,224,.14);
    --rojo:#FF4438;
    --menta:#58D7B8;
    --axis-h:calc(100% - 0px);
    --gutter:clamp(14px,4vw,32px);
    --track:44px;
    --poster-w:86px;   /* 72px póster + 14px gap: desplaza el eje para alinear con las pistas */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--tinta);
    color:var(--hueso);
    font-family:"IBM Plex Sans",system-ui,sans-serif;
    font-size:15px;line-height:1.45;
    padding-bottom:80px;
    background-image:radial-gradient(ellipse 90% 50% at 50% -10%, rgba(88,215,184,.10), transparent 70%);
  }
  .wrap{max-width:1080px;margin:0 auto;padding:0 var(--gutter)}

  /* ---------- Cabecera ---------- */
  header{padding:clamp(28px,6vw,56px) 0 18px}
  h1{
    font-family:"Bricolage Grotesque",sans-serif;
    font-weight:800;font-size:clamp(38px,9vw,76px);
    line-height:.92;letter-spacing:-.03em;
    text-wrap:balance;
  }
  h1 em{font-style:normal;color:var(--menta)}
  .lede{margin-top:12px;max-width:46ch;color:var(--hueso-60);font-size:15px}
  .meta{
    margin-top:14px;display:flex;flex-wrap:wrap;gap:8px 14px;align-items:center;
    font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--hueso-35);
    text-transform:uppercase;letter-spacing:.08em;
  }
  .badge-demo{
    color:var(--tinta);background:var(--rojo);
    padding:3px 8px;border-radius:2px;font-weight:600;letter-spacing:.06em;
  }

  /* ---------- Filtros ---------- */
  .buscador{
    position:relative;display:flex;align-items:center;
    margin-top:18px;
  }
  .buscador .lupa{
    position:absolute;left:14px;width:18px;height:18px;
    fill:none;stroke:var(--hueso-35);stroke-width:2;stroke-linecap:round;
    pointer-events:none;
  }
  #q{
    width:100%;font:inherit;font-size:16px;
    background:var(--tinta-2);color:var(--hueso);
    border:1px solid var(--hueso-14);border-radius:10px;
    padding:12px 40px 12px 42px;
    transition:border-color .12s,background .12s;
    -webkit-appearance:none;appearance:none;
  }
  #q::placeholder{color:var(--hueso-35)}
  #q:focus{outline:none;border-color:var(--menta);background:var(--tinta)}
  #q::-webkit-search-cancel-button{-webkit-appearance:none;appearance:none}
  .q-clear{
    position:absolute;right:10px;
    background:var(--hueso-14);color:var(--hueso);
    border:0;border-radius:50%;width:24px;height:24px;
    font-size:18px;line-height:1;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .12s;
  }
  .q-clear:hover{background:var(--hueso-35);color:var(--tinta)}
  .resaltado{background:var(--menta);color:var(--tinta);border-radius:2px;padding:0 1px}

  .filtros{
    display:flex;flex-wrap:wrap;gap:6px;
    padding:16px 0 10px;
  }
  .grupo{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-right:10px}
  .grupo-label{
    font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--hueso-35);
    text-transform:uppercase;letter-spacing:.1em;margin-right:2px;
  }
  .chip{
    font:inherit;font-size:13px;
    background:transparent;color:var(--hueso-60);
    border:1px solid var(--hueso-14);border-radius:999px;
    padding:5px 12px;cursor:pointer;
    transition:background .12s,color .12s,border-color .12s;
    white-space:nowrap;
  }
  .chip:hover{border-color:var(--hueso-35);color:var(--hueso)}
  .chip[aria-pressed="true"]{background:var(--hueso);color:var(--tinta);border-color:var(--hueso);font-weight:600}
  .chip:focus-visible,.pelicula:focus-visible,.hora:focus-visible{outline:2px solid var(--menta);outline-offset:2px}
  .grupo-cines{flex-direction:column;align-items:stretch;gap:10px;width:100%}
  .cines-head{margin-bottom:2px}
  .chip-todos{font-weight:600}
  .cadena-grupo{display:flex;flex-direction:column;gap:5px}
  .cadena-label{
    font-family:"IBM Plex Mono",monospace;font-size:10px;font-weight:600;
    letter-spacing:.1em;text-transform:uppercase;color:var(--menta);
    opacity:.85;
  }
  .cadena-cines{display:flex;flex-wrap:wrap;gap:5px}
  .chip-cine{font-size:12.5px;padding:4px 10px}


  /* ---------- Regla horaria (el eje compartido) ---------- */
  body.buscando .regla-sticky{ display:none; }
  body.buscando #grupo-dia{ display:none; }
  .regla-sticky{
    position:sticky;top:0;z-index:20;
    background:linear-gradient(var(--tinta) 72%, rgba(22,24,58,0));
    padding-top:8px;
  }
  .regla{
    position:relative;height:26px;
    margin-left:calc(var(--poster-w) + var(--track));
    border-bottom:1px solid var(--hueso-14);
  }
  .tick{
    position:absolute;bottom:0;transform:translateX(-50%);
    font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--hueso-35);
    padding-bottom:5px;
  }
  .tick::after{
    content:"";position:absolute;left:50%;bottom:0;width:1px;height:4px;
    background:var(--hueso-14);
  }
  .ahora-linea{
    position:absolute;top:0;bottom:0;width:1px;background:var(--rojo);
    z-index:5;pointer-events:none;
  }
  .ahora-linea::before{
    content:"AHORA";position:absolute;top:-2px;left:4px;
    font-family:"IBM Plex Mono",monospace;font-size:10px;font-weight:600;
    letter-spacing:.1em;color:var(--rojo);
  }

  /* ---------- Lista de películas ---------- */
  .lista{position:relative}
  .pelicula{
    display:block;width:100%;text-align:left;
    background:transparent;border:0;border-bottom:1px solid var(--hueso-14);
    color:inherit;font:inherit;cursor:pointer;
    padding:18px 0 16px;
  }
  .pelicula{
    display:flex;gap:14px;align-items:stretch;
  }
  .poster-wrap{position:relative;flex-shrink:0;display:block}
  .poster-tooltip{
    display:none;position:absolute;top:0;left:calc(100% + 10px);z-index:30;
    width:240px;padding:12px 14px;
    background:var(--tinta-2);border:1px solid var(--hueso-14);border-radius:10px;
    box-shadow:0 8px 24px rgba(0,0,0,.35);
    text-align:left;pointer-events:none;
  }
  .poster-wrap:hover .poster-tooltip{display:block}
  .tt-duracion{
    display:inline-block;font-family:"IBM Plex Mono",monospace;font-size:11px;
    color:var(--menta);font-weight:600;margin-bottom:6px;
  }
  .tt-sinopsis{
    margin:0;font-size:12.5px;line-height:1.5;color:var(--hueso-60);
    display:-webkit-box;-webkit-line-clamp:6;-webkit-box-orient:vertical;overflow:hidden;
  }
  @media (max-width:640px){
    .poster-tooltip{display:none !important}   /* sin hover real en touch */
  }
  .poster{
    flex-shrink:0;width:72px;height:104px;object-fit:cover;
    border-radius:8px;background:var(--tinta-2);
    border:1px solid var(--hueso-14);
  }
  .poster-vacio{
    display:flex;align-items:center;justify-content:center;
    font-size:28px;opacity:.35;
  }
  .pelicula-info{flex:1;min-width:0;display:flex;flex-direction:column;}
  @media (max-width:640px){
    .poster{width:56px;height:82px;}
  }
  .pelicula:hover .titulo{color:var(--menta)}
  .fila-top{display:flex;align-items:baseline;gap:12px;margin-bottom:10px}
  .titulo{
    font-family:"Bricolage Grotesque",sans-serif;
    font-weight:700;font-size:clamp(19px,2.6vw,26px);
    letter-spacing:-.015em;line-height:1.15;
    transition:color .12s;
  }
  .datos{
    margin-left:auto;flex-shrink:0;
    font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--hueso-35);
    letter-spacing:.06em;white-space:nowrap;
  }
  .sub{
    font-family:"IBM Plex Mono",monospace;font-size:11.5px;color:var(--hueso-35);
    letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px;
  }
  .sub b{color:var(--menta);font-weight:600}
  .sub .pasada{color:var(--hueso-35)}

  /* Pista compacta: cada función es un punto sobre el eje */
  .pista{
    position:relative;height:22px;margin-left:var(--track);
    border-left:1px solid var(--hueso-14);
  }
  .punto{
    position:absolute;top:50%;width:7px;height:7px;border-radius:50%;
    transform:translate(-50%,-50%);
    background:var(--hueso-60);
  }
  .punto.arte{background:var(--menta)}
  .punto.pasada{background:transparent;border:1px solid var(--hueso-14)}

  /* ---------- Detalle expandido ---------- */
  .dia-header{
    font-family:"IBM Plex Mono",monospace;font-size:12px;font-weight:600;
    letter-spacing:.08em;text-transform:uppercase;color:var(--menta);
    padding:14px 0 6px;margin-left:var(--track);
    border-bottom:1px solid var(--hueso-14);margin-bottom:6px;
  }
  .dia-header:first-child{padding-top:4px}
  .detalle{
    padding:4px 0 26px;
  }
  .cine-fila{
    display:grid;grid-template-columns:4px 1fr;
    align-items:stretch;gap:14px;
    padding:14px 0;border-top:1px dashed var(--hueso-14);
  }
  .cine-fila:first-child{border-top:0}
  .cine-marca{
    background:var(--color-cadena,var(--menta));border-radius:2px;
    min-height:100%;
  }
  .cine-info{min-width:0}
  .cine-nombre{
    font-weight:600;font-size:14.5px;margin-bottom:2px;
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  }
  .cine-nombre .arte-tag{
    font-family:"IBM Plex Mono",monospace;font-size:9.5px;letter-spacing:.1em;
    color:var(--menta);border:1px solid var(--menta);border-radius:2px;padding:1px 5px;
  }
  .cine-comuna{
    font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--hueso-35);
    letter-spacing:.05em;margin-bottom:10px;
  }
  .grupos-horario{display:flex;flex-direction:column;gap:8px}
  .grupo-formato{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .formato-label{
    font-family:"IBM Plex Mono",monospace;font-size:10px;font-weight:600;
    letter-spacing:.06em;text-transform:uppercase;color:var(--hueso-35);
    flex-shrink:0;min-width:64px;
  }
  .hora-pills{display:flex;flex-wrap:wrap;gap:6px}
  .hora{
    font-family:"IBM Plex Mono",monospace;font-size:12.5px;font-weight:600;
    background:var(--tinta-2);color:var(--hueso);
    border:1px solid var(--hueso-14);border-radius:5px;
    padding:5px 9px;cursor:pointer;white-space:nowrap;
    transition:background .12s,border-color .12s,transform .12s;
  }
  .hora:hover{background:var(--hueso);color:var(--tinta);border-color:var(--hueso);transform:translateY(-1px)}
  .hora.pasada{opacity:.32;pointer-events:none}
  .hora.pronto{border-color:var(--rojo);color:var(--rojo)}

  .vacio{
    padding:56px 0;text-align:center;color:var(--hueso-35);
    font-family:"IBM Plex Mono",monospace;font-size:13px;
  }
  .vacio b{display:block;color:var(--hueso);font-family:"Bricolage Grotesque",sans-serif;font-size:22px;margin-bottom:8px}

  @media (max-width:640px){
    :root{--track:0px; --poster-w:70px}
    .cine-fila{grid-template-columns:1fr}
    .datos{display:none}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Cartelera<br><em>Santiago</em></h1>
    <p class="lede">Todas las funciones del día sobre un mismo eje horario. Escanea hacia abajo y encuentra la película que alcanzas a ver.</p>
    <div class="meta" id="meta"></div>
  </header>

  <div class="buscador">
    <svg class="lupa" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
    <input type="search" id="q" placeholder="Buscar película…" autocomplete="off" spellcheck="false" aria-label="Buscar película">
    <button id="q-clear" class="q-clear" aria-label="Limpiar búsqueda" hidden>&times;</button>
  </div>

  <div class="filtros" id="filtros"></div>

  <div class="regla-sticky">
    <div class="regla" id="regla"></div>
  </div>

  <main class="lista" id="lista"></main>

</div>

<script>
const AXIS_INI = 11 * 60;   // 11:00
const AXIS_FIN = 26 * 60;   // 02:00 del día siguiente
const AXIS_SPAN = AXIS_FIN - AXIS_INI;

let DATA = null;
const estado = { dia:null, q:"", cines:new Set(), abierta:null };

/* Normaliza para búsqueda: sin acentos, minúsculas. "Estación"→"estacion" */
function norm(t){
  return String(t ?? "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

/* Minutos desde medianoche del día de cartelera, permitiendo trasnoche (>24h) */
function minutosEje(iso, fechaBase){
  const d = new Date(iso);
  const base = new Date(fechaBase + "T00:00:00");
  return Math.round((d - base) / 60000);
}
function esHoy(){ return estado.dia === new Date().toLocaleDateString("en-CA",{timeZone:"America/Santiago"}); }
function pct(min){
  return Math.min(100, Math.max(0, ((min - AXIS_INI) / AXIS_SPAN) * 100));
}
function hhmm(min){
  const h = Math.floor(min / 60) % 24, m = min % 60;
  return String(h).padStart(2,"0") + ":" + String(m).padStart(2,"0");
}
/* Si estás mirando un día futuro, "ahora" no aplica: nada está pasado. */
function ahoraMin(){
  if (!esHoy()) return -Infinity;
  const n = new Date();
  const base = new Date(estado.dia + "T00:00:00");
  return Math.round((n - base) / 60000);
}

async function cargar(){
  const res = await fetch("data/cartelera.json", { cache:"no-cache" });
  DATA = await res.json();
  DATA.cineIdx = Object.fromEntries(DATA.cines.map(c => [c.id, c]));
  DATA.dias = DATA.dias ?? [DATA.fecha];
  estado.dia = DATA.dias[0];
  pintarMeta();
  pintarFiltros();
  cablearBuscador();
  pintarRegla();
  pintarLista();
  setInterval(() => { pintarRegla(); pintarLista(); }, 60000);
}

function pintarMeta(){
  const gen = new Date(DATA.generado);
  const fecha = new Date(DATA.fecha + "T12:00:00")
    .toLocaleDateString("es-CL", { weekday:"long", day:"numeric", month:"long" });
  const n = DATA.peliculas.reduce((a,p) => a + p.funciones.length, 0);
  document.getElementById("meta").innerHTML =
    (DATA.demo ? '<span class="badge-demo">Datos de demostración</span>' : "") +
    `<span>${fecha}</span><span>${DATA.peliculas.length} películas · ${n} funciones</span>` +
    `<span>Actualizado ${gen.toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"})}</span>`;
}


/* Resumen legible de en qué días hay funciones. "Hoy, mañana y sáb 19" */
function resumenDias(fs){
  const hoy = new Date().toLocaleDateString("en-CA",{timeZone:"America/Santiago"});
  const dias = [...new Set(fs.map(f => f.dia))].sort();
  const etiqueta = d => {
    if (d === hoy) return "hoy";
    const dObj = new Date(d + "T12:00:00");
    const diff = Math.round((new Date(d+"T00:00:00") - new Date(hoy+"T00:00:00")) / 86400000);
    if (diff === 1) return "mañana";
    return dObj.toLocaleDateString("es-CL",{weekday:"short", day:"numeric"});
  };
  const nombres = dias.map(etiqueta);
  if (nombres.length === 1) return `<b>${cap(nombres[0])}</b>`;
  if (nombres.length === 2) return `<b>${cap(nombres[0])}</b> y <b>${nombres[1]}</b>`;
  return `<b>${cap(nombres[0])}</b>, ` + nombres.slice(1,-1).map(n=>`<b>${n}</b>`).join(", ") + ` y <b>${nombres.at(-1)}</b>`;
}
function cap(s){ return s.charAt(0).toUpperCase() + s.slice(1); }

/* Envuelve en <mark> la parte del título que coincide con la búsqueda. */
function resaltar(titulo, q){
  if (!q) return escapeHTML(titulo);
  const nt = norm(titulo), nq = norm(q);
  const i = nt.indexOf(nq);
  if (i < 0) return escapeHTML(titulo);
  // Usamos los índices sobre el string normalizado, que preserva longitud 1:1.
  return escapeHTML(titulo.slice(0, i))
    + '<mark class="resaltado">' + escapeHTML(titulo.slice(i, i + q.length)) + '</mark>'
    + escapeHTML(titulo.slice(i + q.length));
}
function escapeHTML(t){
  return String(t).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

/* Buscador en vivo: filtra por título mientras se escribe. */
function cablearBuscador(){
  const input = document.getElementById("q");
  const clear = document.getElementById("q-clear");
  let t = null;
  input.addEventListener("input", () => {
    estado.q = input.value.trim();
    clear.hidden = !estado.q;
    document.body.classList.toggle("buscando", !!estado.q);
    clearTimeout(t);
    t = setTimeout(pintarLista, 120);   // debounce leve
  });
  clear.addEventListener("click", () => {
    input.value = ""; estado.q = ""; clear.hidden = true;
    document.body.classList.remove("buscando");
    input.focus(); pintarLista();
  });
  // "/" enfoca el buscador (atajo de teclado)
  document.addEventListener("keydown", e => {
    if (e.key === "/" && document.activeElement !== input){ e.preventDefault(); input.focus(); }
    if (e.key === "Escape" && document.activeElement === input && estado.q){ clear.click(); }
  });
}

/* Selector de cines, agrupado por cadena. Reemplaza los filtros de comuna/idioma. */
function grupoCines(){
  const cont = document.createElement("div");
  cont.className = "grupo grupo-cines";

  // Orden de cadenas y agrupación
  const ordenCadena = ["Cinemark", "Cineplanet", "Cinépolis", "Normandie", "Cineteca", "Cine UC", "El Biógrafo"];
  const porCadena = {};
  for (const c of DATA.cines){
    (porCadena[c.cadena] ??= []).push(c);
  }
  const cadenas = Object.keys(porCadena).sort((a,b) => {
    const ia = ordenCadena.indexOf(a), ib = ordenCadena.indexOf(b);
    return (ia<0?99:ia) - (ib<0?99:ib) || a.localeCompare(b);
  });

  // Botón "Todos" que limpia la selección
  const head = document.createElement("div");
  head.className = "cines-head";
  const todos = document.createElement("button");
  todos.className = "chip chip-todos";
  todos.textContent = "Todos los cines";
  todos.setAttribute("aria-pressed", estado.cines.size === 0);
  todos.onclick = () => { estado.cines.clear(); refrescarCines(cont); pintarLista(); };
  head.appendChild(todos);
  cont.appendChild(head);

  for (const cadena of cadenas){
    const grupo = document.createElement("div");
    grupo.className = "cadena-grupo";
    const lbl = document.createElement("div");
    lbl.className = "cadena-label";
    lbl.textContent = cadena;
    grupo.appendChild(lbl);

    const fila = document.createElement("div");
    fila.className = "cadena-cines";
    porCadena[cadena]
      .sort((a,b) => a.nombre.localeCompare(b.nombre,"es"))
      .forEach(c => {
        const b = document.createElement("button");
        b.className = "chip chip-cine";
        b.dataset.cine = c.id;
        // Nombre sin el prefijo de cadena repetido (ej "Cinemark Alto..." -> "Alto...")
        b.textContent = c.nombre.replace(new RegExp("^"+cadena+"\\s*","i"), "").trim() || c.nombre;
        b.setAttribute("aria-pressed", estado.cines.has(c.id));
        b.onclick = () => {
          estado.cines.has(c.id) ? estado.cines.delete(c.id) : estado.cines.add(c.id);
          refrescarCines(cont);
          pintarLista();
        };
        fila.appendChild(b);
      });
    grupo.appendChild(fila);
    cont.appendChild(grupo);
  }
  return cont;
}

/* Actualiza el estado visual de los chips de cine sin repintar todo. */
function refrescarCines(cont){
  cont.querySelector(".chip-todos")?.setAttribute("aria-pressed", estado.cines.size === 0);
  cont.querySelectorAll(".chip-cine").forEach(b => {
    b.setAttribute("aria-pressed", estado.cines.has(b.dataset.cine));
  });
}

/* Selector de día: única opción activa a la vez. */
function grupoDias(){
  const cont = document.createElement("div");
  cont.className = "grupo";
  cont.id = "grupo-dia";
  cont.innerHTML = `<span class="grupo-label">Día</span>`;
  const hoy = new Date().toLocaleDateString("en-CA",{timeZone:"America/Santiago"});
  DATA.dias.forEach((d, i) => {
    const b = document.createElement("button");
    b.className = "chip";
    b.textContent = d === hoy ? "Hoy"
      : i === 1 ? "Mañana"
      : new Date(d + "T12:00:00").toLocaleDateString("es-CL",{weekday:"short", day:"numeric"});
    b.setAttribute("aria-pressed", estado.dia === d);
    b.onclick = () => {
      estado.dia = d;
      estado.abierta = null;
      [...cont.querySelectorAll(".chip")].forEach(c => c.setAttribute("aria-pressed", false));
      b.setAttribute("aria-pressed", true);
      pintarRegla(); pintarLista();
    };
    cont.appendChild(b);
  });
  return cont;
}

function pintarFiltros(){
  const cont = document.getElementById("filtros");
  cont.appendChild(grupoDias());
  cont.appendChild(grupoCines());
}

function pintarRegla(){
  const r = document.getElementById("regla");
  r.innerHTML = "";
  for (let h = 12; h <= 26; h += 2){
    const t = document.createElement("span");
    t.className = "tick";
    t.style.left = pct(h * 60) + "%";
    t.textContent = hhmm(h * 60);
    r.appendChild(t);
  }
  const a = ahoraMin();
  if (a >= AXIS_INI && a <= AXIS_FIN){
    const l = document.createElement("div");
    l.className = "ahora-linea";
    l.style.left = pct(a) + "%";
    r.appendChild(l);
  }
}

function pasaFiltros(f){
  const cine = DATA.cineIdx[f.cine];
  if (!cine) return false;
  // Con búsqueda activa ignoramos el día: se busca en toda la semana.
  if (!estado.q && (f.dia ?? DATA.fecha) !== estado.dia) return false;
  if (estado.cines.size && !estado.cines.has(f.cine)) return false;
  return true;
}

function pintarLista(){
  const lista = document.getElementById("lista");
  const a = ahoraMin();

  const q = norm(estado.q);
  const buscando = !!estado.q;
  const hoyStr = new Date().toLocaleDateString("en-CA",{timeZone:"America/Santiago"});

  const items = DATA.peliculas
    .filter(p => !q || norm(p.titulo).includes(q))
    .map(p => {
      let fs = p.funciones.filter(pasaFiltros).map(f => {
        const dia = f.dia ?? DATA.fecha;
        // En búsqueda, el eje se mide contra el día propio de la función.
        return { ...f, dia, min: minutosEje(f.inicio, dia) };
      });
      if (buscando){
        // Solo descartar funciones realmente pasadas (de hoy y antes de ahora).
        fs = fs.filter(f => f.dia > hoyStr || (f.dia === hoyStr && f.min >= a - 10));
        fs.sort((x,y) => x.dia.localeCompare(y.dia) || x.min - y.min);
      } else {
        fs = fs.filter(f => f.min >= a - 10);   // siempre oculta funciones ya pasadas
        fs.sort((x,y) => x.min - y.min);
      }
      return { ...p, fs };
    }).filter(p => p.fs.length);

  if (buscando)
    items.sort((x,y) => x.fs[0].dia.localeCompare(y.fs[0].dia) || x.fs[0].min - y.fs[0].min || x.titulo.localeCompare(y.titulo,"es"));
  else
    items.sort((x,y) => x.fs[0].min - y.fs[0].min || x.titulo.localeCompare(y.titulo,"es"));

  lista.innerHTML = "";
  if (!items.length){
    lista.innerHTML = estado.q
      ? `<div class="vacio"><b>Sin resultados</b>Ninguna película coincide con “${estado.q}”. Prueba otro nombre o revisa otro día.</div>`
      : `<div class="vacio"><b>Nada que calce</b>No hay funciones con esos filtros. Prueba con otro día o cine.</div>`;
    return;
  }

  items.forEach(p => {
    const prox = p.fs.find(f => f.min >= a);
    const art = document.createElement("article");

    const btn = document.createElement("button");
    btn.className = "pelicula";
    btn.setAttribute("aria-expanded", estado.abierta === p.id);
    const imgPoster = p.poster
      ? `<img class="poster" src="${p.poster}" alt="" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="poster poster-vacio" aria-hidden="true">\uD83C\uDFAC</div>`;
    const tooltip = (p.sinopsis || p.duracion) ? `
      <div class="poster-tooltip">
        ${p.duracion ? `<span class="tt-duracion">${p.duracion} min</span>` : ""}
        ${p.sinopsis ? `<p class="tt-sinopsis">${escapeHTML(p.sinopsis)}</p>` : ""}
      </div>` : "";
    const poster = `<span class="poster-wrap">${imgPoster}${tooltip}</span>`;
    btn.innerHTML = `
      ${poster}
      <div class="pelicula-info">
        <div class="fila-top">
          <span class="titulo">${resaltar(p.titulo, estado.q)}</span>
          <span class="datos">${p.duracion ? p.duracion + " min" : ""}${p.clasificacion && p.clasificacion !== "S/I" ? " · " + p.clasificacion : ""}</span>
        </div>
        <div class="sub">
          ${buscando ? resumenDias(p.fs)
            : (prox ? `Próxima <b>${hhmm(prox.min)}</b> en ${DATA.cineIdx[prox.cine].nombre}`
                    : `<span class="pasada">Sin funciones por delante</span>`)}
          · ${p.fs.length} ${p.fs.length === 1 ? "función" : "funciones"}
        </div>
        ${buscando ? "" : '<div class="pista"></div>'}
      </div>`;

    if (!buscando){
      const pista = btn.querySelector(".pista");
      p.fs.forEach(f => {
        const d = document.createElement("span");
        const cine = DATA.cineIdx[f.cine];
        d.className = "punto" + (cine.tipo === "arte" ? " arte" : "") + (f.min < a ? " pasada" : "");
        d.style.left = pct(f.min) + "%";
        d.title = `${hhmm(f.min)} — ${cine.nombre}`;
        pista.appendChild(d);
      });
    }

    btn.onclick = () => {
      estado.abierta = estado.abierta === p.id ? null : p.id;
      pintarLista();
    };
    art.appendChild(btn);

    if (estado.abierta === p.id) art.appendChild(pintarDetalle(p, a));
    lista.appendChild(art);
  });
}

function pintarDetalle(p, a){
  const det = document.createElement("div");
  det.className = "detalle";

  if (estado.q){
    // En búsqueda: agrupar por día, con encabezado, y dentro por cine.
    const hoy = new Date().toLocaleDateString("en-CA",{timeZone:"America/Santiago"});
    const porDia = {};
    p.fs.forEach(f => (porDia[f.dia] ||= []).push(f));
    Object.keys(porDia).sort().forEach(dia => {
      const h = document.createElement("div");
      h.className = "dia-header";
      const dObj = new Date(dia + "T12:00:00");
      const diff = Math.round((new Date(dia+"T00:00:00") - new Date(hoy+"T00:00:00")) / 86400000);
      const etq = dia === hoy ? "Hoy" : diff === 1 ? "Mañana"
        : dObj.toLocaleDateString("es-CL",{weekday:"long", day:"numeric", month:"long"});
      h.textContent = etq.charAt(0).toUpperCase() + etq.slice(1);
      det.appendChild(h);
      pintarCinesDelDia(det, porDia[dia], a);
    });
  } else {
    pintarCinesDelDia(det, p.fs, a);
  }

  return det;
}

/* Dibuja las filas por cine para un conjunto de funciones (de un mismo día). */
function pintarCinesDelDia(det, funciones, a){
  const porCine = {};
  funciones.forEach(f => (porCine[f.cine] ||= []).push(f));

  Object.entries(porCine)
    .sort((x,y) => x[1][0].min - y[1][0].min)
    .forEach(([cineId, fs]) => {
      const cine = DATA.cineIdx[cineId];
      const fila = document.createElement("div");
      fila.className = "cine-fila";
      fila.innerHTML = `
        <div class="cine-marca" style="--color-cadena:${colorCadena(cine.cadena)}"></div>
        <div class="cine-info">
          <div class="cine-nombre">
            ${cine.nombre}${cine.tipo === "arte" ? '<span class="arte-tag">CINE ARTE</span>' : ""}
          </div>
          <div class="cine-comuna">${cine.cadena} · ${cine.comuna}</div>
          <div class="grupos-horario"></div>
        </div>`;

      // Agrupar funciones por "formato + idioma" (ej "2D · SUB"), como hace vamosalcine.
      // Dentro de cada grupo, los horarios van en orden y sin superponerse.
      const grupos = {};
      fs.sort((x,y) => x.min - y.min).forEach(f => {
        const etq = [f.formato, ...(f.atributos ?? []), f.idioma !== "S/I" ? f.idioma : null]
          .filter(Boolean).join(" · ");
        (grupos[etq || "—"] ??= []).push(f);
      });

      const cont = fila.querySelector(".grupos-horario");
      const esHoy = fs[0]?.dia === new Date().toLocaleDateString("en-CA",{timeZone:"America/Santiago"});
      Object.entries(grupos).forEach(([etq, lista]) => {
        const grp = document.createElement("div");
        grp.className = "grupo-formato";
        const lbl = document.createElement("span");
        lbl.className = "formato-label";
        lbl.textContent = etq;
        grp.appendChild(lbl);
        const pills = document.createElement("div");
        pills.className = "hora-pills";
        lista.forEach(f => {
          const b = document.createElement("button");
          b.className = "hora" + (esHoy && f.min < a ? " pasada" : "") + (esHoy && f.min >= a && f.min < a + 45 ? " pronto" : "");
          b.textContent = hhmm(f.min);
          if (f.sala) b.title = f.sala;
          if (f.url) b.onclick = e => { e.stopPropagation(); window.open(f.url, "_blank", "noopener"); };
          else b.onclick = e => e.stopPropagation();
          pills.appendChild(b);
        });
        grp.appendChild(pills);
        cont.appendChild(grp);
      });

      det.appendChild(fila);
    });
}

/** Color distintivo por cadena, para escanear rápido a qué cadena pertenece cada fila. */
function colorCadena(cadena){
  const MAPA = {
    "Cinemark": "#ff5a4e", "Cineplanet": "#3ea6ff", "Cinépolis": "#ffb020",
  };
  return MAPA[cadena] || "var(--menta)";   // cine arte y otros: verde menta
}


window.addEventListener("resize", () => { if (estado.abierta) pintarLista(); });
cargar();

if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
</script>
